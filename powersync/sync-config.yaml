config:
  edition: 3

streams:
  user_notes:
    auto_subscribe: true
    queries:
      - SELECT id, title, content, source_url, tags, ai_summary, ai_tags, ai_connections, is_processed, created_at, updated_at, owner_id FROM notes WHERE owner_id = token_parameters.user_id

  note_connections:
    auto_subscribe: true
    queries:
      - >
        SELECT c.id, c.source_note_id, c.target_note_id, c.relationship, c.confidence, c.created_at
        FROM connections c
        INNER JOIN notes n ON c.source_note_id = n.id
        WHERE n.owner_id = token_parameters.user_id

  all_tags:
    auto_subscribe: true
    queries:
      - SELECT id, name, note_count, created_at FROM tags
