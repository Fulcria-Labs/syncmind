telemetry:
  disable_telemetry_sharing: false

replication:
  connections:
    - type: postgresql
      uri: !env PS_DATA_SOURCE_URI
      sslmode: disable

storage:
  type: mongodb
  uri: !env PS_MONGO_URI

port: !env PS_PORT

sync_config:
  path: sync-config.yaml

client_auth:
  jwks_uri: !env PS_JWKS_URL
  audience: ["powersync-dev", "powersync"]

api:
  tokens:
    - syncmind-admin-token-2026

system:
  logging:
    level: info
    format: text
