# PowerSync self-hosted config for SyncMind

replication:
  connections:
    - type: postgresql
      uri: postgresql://syncmind:syncmind_dev_2026@syncmind-postgres:5432/syncmind
      sslmode: disable

storage:
  type: mongodb
  uri: mongodb://syncmind-mongo:27017/powersync_storage

client_auth:
  allow_temporary_tokens: true

api:
  tokens:
    - "dev-token-syncmind-2026"

sync_config:
  path: sync-config.yaml
